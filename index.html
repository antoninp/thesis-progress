<!DOCTYPE html>

<title>Thesis progress</title>
<style>
:root {
  --bg: #11151c; --card: #1a2029; --line: #2a3240; --text: #dde3ec;
  --muted: #8b96a5; --accent: #5aa9e6; --good: #4caf7d; --warn: #e0a93e;
  --bad: #e06c5a; --grey: #6b7686;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 16px; background: var(--bg); color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  max-width: 760px; margin-left: auto; margin-right: auto;
}
h1 { font-size: 1.35rem; margin: 0 0 4px; }
h2 { font-size: 1.05rem; margin: 28px 0 10px; color: var(--accent); }
.stamp { color: var(--muted); font-size: 0.8rem; margin-bottom: 10px; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.chip {
  background: var(--card); border: 1px solid var(--line); border-radius: 999px;
  padding: 4px 12px; font-size: 0.8rem; color: var(--text);
}
.kpirow { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  margin-bottom: 10px; }
@media (min-width: 560px) {
  .kpirow { grid-auto-flow: column; grid-auto-columns: 1fr; grid-template-columns: none; }
}
.kpi {
  background: var(--card); border: 1px solid var(--line); border-radius: 10px;
  padding: 10px 12px;
}
.kpi .v { font-size: 1.25rem; font-weight: 600; }
.kpi .l { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
.badge {
  display: inline-block; border-radius: 6px; padding: 2px 10px;
  font-size: 0.95rem; font-weight: 600; color: #11151c;
}
table { border-collapse: collapse; width: 100%; font-size: 0.82rem; }
th, td { border-bottom: 1px solid var(--line); padding: 6px 8px; text-align: right; }
th:first-child, td:first-child,
th.lft, td.lft { text-align: left; }
th { color: var(--muted); font-weight: 500; }
.stage { border-radius: 5px; padding: 1px 8px; font-size: 0.75rem; color: #11151c; }
.weekbar { background: var(--card); border: 1px solid var(--line);
  border-radius: 10px; padding: 12px 14px; margin-top: 10px; }
.weekbar .track { background: var(--line); border-radius: 999px; height: 12px;
  overflow: hidden; margin-top: 8px; }
.weekbar .fill { background: var(--good); height: 100%; border-radius: 999px; }
.svgwrap { background: var(--card); border: 1px solid var(--line);
  border-radius: 10px; padding: 8px; overflow-x: auto; }
.svgwrap svg { max-width: 100%; height: auto; display: block; }
.svgwrap.wide svg { max-width: none; }
.svgwrap { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
.svgwrap::-webkit-scrollbar { height: 10px; }
.svgwrap::-webkit-scrollbar-track { background: transparent; }
.svgwrap::-webkit-scrollbar-thumb { background: var(--line); border-radius: 999px;
  border: 2px solid var(--card); }
.svgwrap::-webkit-scrollbar-thumb:hover { background: var(--muted); }
.note { color: var(--muted); font-size: 0.78rem; margin: 0 0 8px; }
.navlink { color: var(--accent); text-decoration: none; font-weight: 600; }
.topnav { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 16px; }
.topnav a { padding: 7px 16px; border-radius: 8px; font-size: 0.95rem;
  font-weight: 600; text-decoration: none; color: var(--text);
  background: var(--card); border: 1px solid var(--line); }
.topnav a:hover { border-color: var(--accent); color: var(--accent); }
.topnav a.active { background: var(--accent); color: #11151c;
  border-color: var(--accent); }
footer { margin-top: 30px; color: var(--muted); font-size: 0.75rem; }
footer a { color: var(--accent); }
</style>
</head>

  var box = document.getElementById('kpis');
  if (!box) return;
  var h1 = function (x) { return x != null ? x.toFixed(1) : '—'; };
  var v = VERDICT[t.verdict] || [t.verdict, 'var(--grey)'];
  var behindTxt = '—', behindColor = null, behindLbl = 'vs plan';
  if (t.behind_words !== null && t.behind_words !== undefined) {
    if (t.behind_words >= 0) {
      behindTxt = '+' + fmt(t.behind_words); behindColor = 'var(--good)';
      behindLbl = 'words ahead of plan (' + Math.abs(t.behind_days) + 'd)';
    } else {
      behindTxt = '-' + fmt(-t.behind_words); behindColor = 'var(--bad)';
      behindLbl = 'words behind plan (' + Math.abs(t.behind_days) + 'd)';
    }
  }
  var projColor = null;
  if (t.projected_finish) {
    projColor = t.projected_finish <= DATA.targets.deadlines.supervisor
      ? 'var(--good)' : 'var(--bad)';
  }
  var catchTxt = '—', catchColor = null;
  if (t.behind_words !== null && t.behind_words >= 0) {
    catchTxt = 'on plan'; catchColor = 'var(--good)';
  } else if (t.plan_catchup_date) {
    catchTxt = fmtDate(t.plan_catchup_date);
    catchColor = t.plan_catchup_date <= DATA.targets.deadlines.supervisor
      ? 'var(--good)' : 'var(--bad)';
  } else {
    catchTxt = 'not at this pace'; catchColor = 'var(--bad)';
  }
  var bufTxt = '—', bufColor = null;
  if (t.buffer_days !== null && t.buffer_days !== undefined) {
    var wks = Math.round(t.buffer_days / 7);
    var unit = ' wk' + (Math.abs(wks) === 1 ? '' : 's');
    bufTxt = (t.buffer_days >= 0 ? '+' : '-') + Math.abs(wks) + unit;
    bufColor = t.buffer_days >= 0 ? 'var(--good)' : 'var(--bad)';
  }
  var marginTxt = '—', marginColor = null;
  if (t.pace_ratio !== null && t.pace_ratio !== undefined) {
    marginTxt = t.pace_ratio.toFixed(2) + '×';
    marginColor = t.pace_ratio >= 1 ? 'var(--good)' : 'var(--bad)';
  }
  var groups = [
    [
      [fmt(t.words), 'prose words written (' + t.percent_of_target + '%)'],
      ['≈' + fmt(t.final_words), 'drafts with citations'],
      [fmt(t.words_remaining), 'prose words remaining']
    ],
    [
      [fmt(t.velocity_7d_wpw), 'words/week · 7 days'],
      [fmt(t.velocity_14d_wpw), 'words/week · 14 days'],
      [fmt(t.velocity_28d_wpw), 'words/week · 28 days'],
      [fmt(t.required_wpw_supervisor), 'needed/week · supervisor'],
      [marginTxt, 'pace vs needed', marginColor]
    ],
    [
      [null, 'status'],
      [behindTxt, behindLbl, behindColor],
      [fmt(t.plan_expected_today), 'should have by now (plan)'],
      [catchTxt, 'rejoins plan (28d pace)', catchColor],
      [fmtDate(t.projected_finish), 'projected finish (28d pace)', projColor],
      [bufTxt, 'buffer vs supervisor', bufColor]
    ],
    [
      [h1(t.hours_combined_total), 'total hours (est., union)'],
      [h1(t.hours_total), 'writing hours'],
      [h1(t.hours_latex_total), 'LaTeX hours'],
      [h1(t.hours_system_total), 'technical hours'],
      [h1(t.hours_this_week), 'writing hours this week'],
      [fmt(t.words_per_hour), 'prose words / hour']
    ]
  ];
  groups.forEach(function (g) {
    var row = el('div', {'class': 'kpirow'});
    g.forEach(function (c) {
      var card = el('div', {'class': 'kpi'});
      if (c[0] === null) {
        var b = el('span', {'class': 'badge'}, v[0]);
        b.style.background = v[1];
        card.appendChild(b);
      } else {
        var val = el('div', {'class': 'v'}, c[0]);
        if (c[2]) val.style.color = c[2];
        card.appendChild(val);
      }
      card.appendChild(el('div', {'class': 'l'}, c[1]));
      row.appendChild(card);
    });
    box.appendChild(row);
  });
})();

(function weekbar() {
  var t = DATA.totals;
  var box = document.getElementById('weekbar');
  if (!box) return;
  var added = t.this_week_added || 0;
  var req = t.required_wpw_supervisor || 0;
  // Goal = needed/week + 10% (push past needed). The bar scales to that goal,
  // rescaling to this week's actual total once exceeded so it stays full while
  // the plain-needed threshold tick stays visible.
  var goal = req ? Math.round(req * 1.1) : (t.this_week_goal || added || 1);
  var max = Math.max(goal, added) || 1;
  var fillPct = Math.round(added / max * 100);
  // Colour by meaning: red below needed, amber within the 10% buffer, green
  // once at/above the goal (needed + 10%).
  var col = 'var(--good)';
  if (req && added < req) col = 'var(--bad)';
  else if (req && added < req * 1.1) col = 'var(--warn)';
  box.appendChild(el('div', null,
    'This week: ' + fmt(added) + '/' + fmt(goal) + ' words'));
  var track = el('div', {'class': 'track'});
  track.style.position = 'relative';
  var fill = el('div', {'class': 'fill'});
  fill.style.width = Math.max(0, Math.min(100, fillPct)) + '%';
  fill.style.background = col;
  track.appendChild(fill);
  if (req && req < max) {  // tick marking the needed-per-week pace
    var mark = el('div');
    mark.setAttribute('title', 'needed/week to stay on plan: ' + fmt(req));
    mark.style.cssText = 'position:absolute;top:0;bottom:0;width:2px;' +
      'background:var(--text);left:' + (req / max * 100) + '%;';
    track.appendChild(mark);
  }
  box.appendChild(track);
})();

(function pipelineTable() {
  var tbl = document.getElementById('pipeline-table');
  if (!tbl) return;
  var head = el('tr');
  ['Scope', 'Outlines', 'AI drafts', 'Reviews', 'Stage'].forEach(function (h, i) {
    head.appendChild(el('th', i === 0 ? {'class': 'lft'} : null, h));
  });
  tbl.appendChild(head);
  var stageColor = {reviewed: 'var(--good)', drafted: 'var(--accent)',
                    outlined: 'var(--warn)', empty: 'var(--grey)'};
  DATA.pipeline.forEach(function (p) {
    var tr = el('tr');
    tr.appendChild(el('td', {'class': 'lft'}, p.chapter + ' / ' + p.scope));
    [p.outlines, p.drafts, p.reviews].forEach(function (n) {
      tr.appendChild(el('td', null, String(n)));
    });
    var td = el('td');
    var s = el('span', {'class': 'stage'}, p.stage);
    s.style.background = stageColor[p.stage] || 'var(--grey)';
    td.appendChild(s);
    tr.appendChild(td);
    tbl.appendChild(tr);
  });
})();

(function provenanceTable() {
  var tbl = document.getElementById('provenance-table');
  if (!tbl) return;
  var head = el('tr');
  ['Repo', 'HEAD', 'Date'].forEach(function (h, i) {
    head.appendChild(el('th', i === 0 ? {'class': 'lft'} : null, h));
  });
  tbl.appendChild(head);
  (DATA.provenance && DATA.provenance.repos || []).forEach(function (r) {
    var tr = el('tr');
    tr.appendChild(el('td', {'class': 'lft'}, r.name));
    tr.appendChild(el('td', null, r.head.slice(0, 9)));
    tr.appendChild(el('td', null, r.head_date));
    tbl.appendChild(tr);
  });
})();

(function footer() {
  var f = document.getElementById('foot');
  if (!f) return;
  f.appendChild(el('span', null, 'Schema v' + DATA.schema_version + ' · '));
  var a = el('a', {href: 'data.json'}, 'data.json');
  f.appendChild(a);
})();

(function scrollWideToEnd() {
  // Wide full-history charts grow left->right (oldest -> newest). Open them
  // scrolled to the right edge so the most recent days show first; the reader
  // scrolls left to go back in time.
  var wraps = document.querySelectorAll('.svgwrap.wide');
  for (var i = 0; i < wraps.length; i++) wraps[i].scrollLeft = wraps[i].scrollWidth;
})();

</script>
